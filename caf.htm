<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div A4</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        
        .a4-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        
        .a4 {
            width: 210mm;
            height: 297mm;
            background-color: white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 0;
            box-sizing: border-box;
            margin: 20px;
        }
        
        .tessere-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 0;
            height: 100%;
        }
        
        .tessera {
            border: 2px solid #333;
            padding: 0;
            overflow: hidden;
            position: relative;
        }
        
        .tessera img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: rotate(90deg);
        }
        
        @media print {
            body {
                padding: 0;
                background-color: white;
            }
            
            .a4-container {
                margin: 0;
                padding: 0;
            }
            
            .a4 {
                box-shadow: none;
                margin: 0;
                padding: 20mm;
            }
        }
        
        @media screen {
            .a4 {
                max-width: 100%;
                height: auto;
                aspect-ratio: 210/297;
            }
        }
    </style>
</head>
<body>
    <div class="a4-container">
        <div class="a4">
            <div class="tessere-container">
                <div class="tessera"><img src="caf.jpeg" alt="Immagine"></div>
               <div class="tessera"><img src="caf.jpeg" alt="Immagine"></div>
               <div class="tessera"><img src="caf.jpeg" alt="Immagine"></div>
               <div class="tessera"><img src="caf.jpeg" alt="Immagine"></div>
               <div class="tessera"><img src="caf.jpeg" alt="Immagine"></div>
               <div class="tessera"><img src="caf.jpeg" alt="Immagine"></div>
               <div class="tessera"><img src="caf.jpeg" alt="Immagine"></div>
               <div class="tessera"><img src="caf.jpeg" alt="Immagine"></div>
                <div class="tessera"><img src="caf.jpeg" alt="Immagine"></div>
               <div class="tessera"><img src="caf.jpeg" alt="Immagine"></div>
               <div class="tessera"><img src="caf.jpeg" alt="Immagine"></div>
               <div class="tessera"><img src="caf.jpeg" alt="Immagine"></div>
            </div>
        </div>
    </div>
</body>
</html>
